name: Update Card Data

on:
  # Cron disabled for now — uncomment when ready for automated runs
  # schedule:
  #   - cron: '0 6 * * 1'  # Every Monday at 6 AM UTC
  workflow_dispatch:
    inputs:
      bank_filter:
        description: 'Bank slug to scrape (empty = all). Available: axis, hdfc, icici, idfc-first, federal, indusind, rbl, sbi, yes'
        required: false
        type: string

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run scraper
        id: scrape
        run: |
          ARGS=""
          if [ -n "${{ inputs.bank_filter }}" ]; then
            ARGS="--bank=${{ inputs.bank_filter }}"
          fi
          npx tsx scripts/scrape-cards.ts $ARGS
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Create Pull Request
        if: steps.scrape.outputs.cards_changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update card data [automated scrape]'
          title: "🔄 Card data update — ${{ github.event.inputs.bank_filter || 'all banks' }}"
          body: |
            ## Automated Card Data Scrape

            **Triggered by:** ${{ github.actor }}
            **Bank filter:** ${{ github.event.inputs.bank_filter || 'all banks' }}
            **Date:** ${{ github.event.repository.updated_at }}

            ### Changes
            ${{ steps.scrape.outputs.change_summary }}

            ---
            > Review the JSON file diffs below to verify the scraped data is correct.
          branch: auto/update-cards
          labels: data-update
          delete-branch: true
